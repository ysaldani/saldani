<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Terminal Portfolio</title>
    <style>
        body { background-color: #0d0d0d; color: #33ff33; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        #terminal { max-width: 800px; margin: 0 auto; height: 90vh; display: flex; flex-direction: column; }
        #output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; }
        #input-line { display: flex; align-items: center; }
        #prompt { margin-right: 10px; font-weight: bold; }
        #input-field { background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1rem; flex-grow: 1; outline: none; }
        .command { color: #fff; }
        .response { margin-bottom: 10px; white-space: pre-wrap; }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">
        <div>مرحباً بك في Terminal الشخصي الخاص بي. اكتب <b>help</b> لعرض القائمة.</div>
        <br>
    </div>
    <div id="input-line">
        <span id="prompt">visitor@portfolio:~$</span>
        <input type="text" id="input-field" autofocus autocomplete="off">
    </div>
</div>

<script>
    const inputField = document.getElementById('input-field');
    const output = document.getElementById('output');

    const commands = {
        'help': 'الأوامر المتاحة:\n- about: معلومات عني\n- skills: مهاراتي التقنية\n- contact: طرق التواصل\n- clear: مسح الشاشة',
        'about': 'أنا مطور برمجيات شغوف ببناء تجارب رقمية فريدة.',
        'skills': 'لغات البرمجة: JavaScript, Python, HTML/CSS\nأدوات: Git, Docker, React',
        'contact': 'يمكنك مراسلتي عبر: email@example.com',
    };

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const command = inputField.value.trim().toLowerCase();
            const responseDiv = document.createElement('div');
            
            // Display command
            output.innerHTML += `<div><span style="color:#0f0">visitor@portfolio:~$</span> ${command}</div>`;

            // Process command
            if (command === 'clear') {
                output.innerHTML = '';
            } else if (commands[command]) {
                responseDiv.className = 'response';
                responseDiv.textContent = commands[command];
                output.appendChild(responseDiv);
            } else if (command !== '') {
                output.innerHTML += `<div class="response">الأمر غير معروف: ${command}</div>`;
            }

            inputField.value = '';
            output.scrollTop = output.scrollHeight;
        }
    });

    // Keep input focused
    document.body.addEventListener('click', () => inputField.focus());
</script>

</body>
</html>
