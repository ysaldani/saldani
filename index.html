<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Terminal</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; height: 100vh; overflow: hidden; }
        #terminal { max-width: 900px; margin: 0 auto; height: 90vh; display: flex; flex-direction: column; }
        #output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 1.1rem; line-height: 1.5; }
        #input-line { display: flex; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
        #prompt { margin-right: 10px; font-weight: bold; color: #ff00ff; }
        #input-field { background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1.1rem; flex-grow: 1; outline: none; }
        
        .response { margin-bottom: 15px; white-space: pre-wrap; color: #e0e0e0; }
        .ascii-art { color: #00ff41; font-size: 0.6rem; line-height: 1.1; white-space: pre; font-weight: bold; }
        
        .ls-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; color: #00e5ff; margin-bottom: 10px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">
        <div>System initialized...</div>
        <div>Type <span style="color:#00e5ff">'help'</span> to see commands and available files.</div>
        <br>
    </div>
    <div id="input-line">
        <span id="prompt">user@portfolio:~$</span>
        <input type="text" id="input-field" autofocus autocomplete="off">
    </div>
</div>

<script>
    const inputField = document.getElementById('input-field');
    const output = document.getElementById('output');

    // ASCII portrait data
    const profileAscii = `
        ..:----:...        
    ..:------------------:.    
   :------------------------:  
  .--------------------------. 
 .----------------------------.
 ::--------------------------::
 .----------------------------.
  :--------------------------: 
   :----:  ..:----:  ..:----:  
    :---:.:. :----:.:. :---:   
     :--------------------:    
      :--:---::..::---:--:     
       :----:..  ..:----:      
        :::.      .:::         
         .  .:---:.  .         
          :--:---:--:          
          .:--:--:--:.          
        .:----:--:----:.        
       ::-------------::       
      :::-------------:::      
     :::---------------:::     
    :::-----------------:::    
   :::-------------------:::   
    `;

    // File system data
    const files = {
        'bio': 'I am a highly skilled Software Developer with over a decade of experience in decentralized finance and systems architecture. I specialize in building robust, secure, and scalable blockchain applications. My goal is to bridge the gap between complex financial theory and user-friendly digital solutions.',
        'project': 'My Cryptocurrency Project: Developing decentralized protocols aimed at enhancing security and liquidity in the DeFi space. Focused on smart contract auditing and creating cross-chain solutions to streamline asset management.',
        'skills': 'Technical Expertise:\n- Programming: Python, JavaScript, Solidity, Rust\n- Blockchain: Ethereum, Layer 2, Web3.js, Hardhat\n- Infrastructure: Docker, Kubernetes, Cloud Security, System Auditing',
        'contact': {
            ascii: profileAscii,
            info: 'Contact Information:\n- Email   : 1988developer@gmail.com\n- Phone   : +44 7933 365126\n- PayPal  : 1988developer@gmail.com\nFeel free to reach out for collaborations!'
        }
    };

    inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const input = inputField.value.trim();
            const parts = input.split(' ');
            const command = parts[0].toLowerCase();
            const argument = parts[1];

            output.innerHTML += `<div><span style="color:#ff00ff">user@portfolio:~$</span> ${input}</div>`;

            // Execute commands
            if (command === 'clear') {
                output.innerHTML = '';
            } 
            else if (command === 'help') {
                const fileList = Object.keys(files).join(', ');
                output.innerHTML += `<div class="response">
Commands:
- ls        : List files
- cd [file] : Open specific file
- clear     : Clear terminal

Available files:
${fileList}
</div>`;
            }
            else if (command === 'ls') {
                const fileList = Object.keys(files).map(f => `<span>${f}</span>`).join('');
                output.innerHTML += `<div class="ls-list">${fileList}</div>`;
            }
            else if (command === 'cd') {
                if (!argument) {
                    output.innerHTML += `<div class="response">Usage: cd [filename]</div>`;
                } else if (files[argument]) {
                    if (argument === 'contact') {
                        // Display portrait and info
                        output.innerHTML += `<div class="ascii-art">${files[argument].ascii}</div>`;
                        output.innerHTML += `<div class="response">${files[argument].info}</div>`;
                    } else {
                        output.innerHTML += `<div class="response">${files[argument]}</div>`;
                    }
                } else {
                    output.innerHTML += `<div class="response">bash: cd: ${argument}: No such file or directory</div>`;
                }
            }
            else if (input !== '') {
                output.innerHTML += `<div class="response">Command not found: ${command}</div>`;
            }

            inputField.value = '';
            output.scrollTop = output.scrollHeight;
        }
    });

    // Ensure input focus
    document.body.addEventListener('click', () => inputField.focus());
</script>

</body>
</html>
